name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Linux deps
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev pkg-config

    - name: Install macOS deps
      if: runner.os == 'macOS'
      run: brew install pkg-config glfw3 || true

    # Windows: Ensure MinGW/msys2 for cgo if needed, but often just works for Ebiten
    - name: Setup Windows deps
      if: runner.os == 'Windows'
      run: |
        echo "No extra deps needed for basic Ebiten on Windows runner"
        # Optional: choco install mingw if linker fails later

    - name: Build
      run: |
        CGO_ENABLED=1 go build -v -x -o TesselBox-$$   {{ runner.os }}   $${{ runner.os == 'Windows' && '.exe' || '' }} cmd/main.go
        dir TesselBox* || ls -la TesselBox* || echo "No binary!"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TesselBox-${{ runner.os }}
        path: TesselBox-*
        if-no-files-found: warn
