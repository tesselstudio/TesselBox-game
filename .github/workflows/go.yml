name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'  # Use your project's Go version; check go.mod if any

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev pkg-config

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install pkg-config libx11 libxcursor libxrandr libxinerama libxi libasound2 libudev wayland libxkbcommon  # Note: brew may need caching later

    - name: Build
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          GOOS=windows GOARCH=amd64 go build -v -o TesselBox.exe cmd/main.go
        elif [ "${{ runner.os }}" = "Linux" ]; then
          GOOS=linux GOARCH=amd64 go build -v -o TesselBox-linux cmd/main.go
        elif [ "${{ runner.os }}" = "macOS" ]; then
          GOOS=darwin GOARCH=amd64 go build -v -o TesselBox-macos cmd/main.go
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TesselBox-${{ runner.os }}
        path: TesselBox*
        if-no-files-found: error
