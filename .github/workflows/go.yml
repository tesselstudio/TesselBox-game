name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]  # Order: easiest first

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install deps Linux
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update || true
        sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev pkg-config libxrandr-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev || true

    - name: Install deps macOS
      if: runner.os == 'macOS'
      run: |
        brew update || true
        brew install pkg-config glfw3 || true

    - name: Debug basics
      run: |
        echo "OS: ${{ runner.os }}"
        go version
        ls -la .
        ls -la cmd/ || echo "cmd/ not found"

    - name: Build
      run: |
        echo "Starting build for ${{ runner.os }}"
        CGO_ENABLED=1 go build -v -o TesselBox-${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }} cmd/main.go || echo "Build failed but continuing"
        ls -la TesselBox* || echo "No binary created"

    - name: Upload if exists
      uses: actions/upload-artifact@v4
      if: always()  # Upload even on failure
      with:
        name: TesselBox-${{ runner.os }}
        path: TesselBox-*
        if-no-files-found: warn
