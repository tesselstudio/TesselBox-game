name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install deps Linux
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev pkg-config || true

    - name: Install deps macOS
      if: runner.os == 'macOS'
      run: brew install pkg-config glfw3 || true

    - name: Debug basics
      shell: bash {0}  # Force bash everywhere
      run: |
        echo "OS: ${{ runner.os }}"
        go version
        ls -la . || dir
        ls -la cmd/ || dir cmd || echo "cmd missing"

    - name: Build
      shell: bash {0}  # ← Key fix: Force bash for consistent env var syntax
      run: |
        CGO_ENABLED=1 go build -v -o TesselBox-${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }} cmd/main.go || echo "Build failed - check logs"
        ls -la TesselBox* || dir TesselBox* || echo "No binary produced"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: TesselBox-${{ runner.os }}
        path: TesselBox-*
        if-no-files-found: warn
