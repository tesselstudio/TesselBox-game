name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        go-version: ['1.22', '1.23']  # Adjust to your Go version; test one first if needed

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build ${{ matrix.os }}
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          GOOS=windows GOARCH=amd64 go build -v -o TesselBox-windows-amd64.exe cmd/main.go
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          GOOS=linux GOARCH=amd64 go build -v -o TesselBox-linux-amd64 cmd/main.go
          # Optional: Add AppImage later if you want packaging
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          GOOS=darwin GOARCH=amd64 go build -v -o TesselBox-macos-amd64 cmd/main.go
          # Optional: Add arm64 build in separate job if needed
        fi

    - name: Upload artifact (${{ matrix.os }})
      uses: actions/upload-artifact@v4
      with:
        name: TesselBox-${{ matrix.os }}
        path: TesselBox-*
        if-no-files-found: error  # Fail if build didn't produce file
