name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Linux deps
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev

    - name: Debug paths
      run: |
        ls -la
        ls cmd/ || echo "No cmd dir"
        go version
        go env

    - name: Build
      run: |
        go build -v -o TesselBox-$$   {{ runner.os }} cmd/main.go || go build -v -o TesselBox-   $${{ runner.os }} main.go  # fallback if no cmd/
        ls -la TesselBox* || echo "No binary produced!"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ runner.os }}
        path: TesselBox-*   # catches .exe, no extension, etc.
        if-no-files-found: warn
