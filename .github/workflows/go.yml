name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    # Linux deps (most common failure point for Ebiten)
    - name: Install Linux deps
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev pkg-config libwayland-dev libxkbcommon-dev libxrandr-dev libxcursor-dev libxi-dev

    # macOS deps via brew
    - name: Install macOS deps
      if: runner.os == 'macOS'
      run: |
        brew update || true
        brew install pkg-config glfw3 || true   # glfw3 is key for Ebiten

    # Simple debug (safe on all OS)
    - name: Debug environment
      run: |
        echo "Runner OS: ${{ runner.os }}"
        go version
        go env | grep CGO
        ls -la cmd/
        echo "Current dir contents:"
        ls -la .

    # Build with verbose + static linking attempt
    - name: Build binary
      run: |
        set -e  # fail on any error
        CGO_ENABLED=1 go build -v -x -o TesselBox-${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }} cmd/main.go
        ls -la TesselBox* || echo "Binary not found after build!"

    - name: Upload artifacts if built
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: TesselBox-${{ runner.os }}
        path: TesselBox-*
        if-no-files-found: warn
