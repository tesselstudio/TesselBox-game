name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v0.1

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: TesselBox-linux
            asset_name: TesselBox-linux.tar.gz
          - os: windows-latest
            artifact_name: TesselBox-windows.exe
            asset_name: TesselBox-windows.zip
          - os: macos-latest
            artifact_name: TesselBox-macos
            asset_name: TesselBox-macos.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # Adjust to your Go version

      - name: Install Dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev pkg-config

      - name: Build
        run: go build -v -o ${{ matrix.artifact_name }} cmd/main.go

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
