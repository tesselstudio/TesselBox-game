name: Build TesselBox Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'  # Match your go.mod if specified; fallback to latest stable

    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libudev-dev

    - name: Go mod download
      run: go mod download

    - name: Build
      run: |
        mkdir -p bin
        if [ "${{ runner.os }}" = "Windows" ]; then
          GOOS=windows GOARCH=amd64 go build -v -o bin/TesselBox.exe cmd/main.go
        elif [ "${{ runner.os }}" = "Linux" ]; then
          GOOS=linux GOARCH=amd64 go build -v -o bin/TesselBox-linux cmd/main.go
        else
          GOOS=darwin GOARCH=amd64 go build -v -o bin/TesselBox-macos cmd/main.go
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TesselBox-binaries-${{ runner.os }}
        path: bin/*
        if-no-files-found: warn  # Don't fail whole run if one OS misses
