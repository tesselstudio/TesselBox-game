name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build TesselBox
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Generate icons
      run: |
        cd build
        ./generate-icons.sh

    - name: Build binary
      run: |
        cd build
        go run build.go \
          -os=${{ matrix.os }} \
          -arch=${{ matrix.arch }} \
          -output=../bin/tesselbox-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
          -release

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: tesselbox-${{ matrix.os }}-${{ matrix.arch }}
        path: bin/tesselbox-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/tesselbox-*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
