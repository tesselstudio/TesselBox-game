name: tesselbox
summary: Hexagon Sandbox Game
description: |
  TesselBox is a hexagon-based sandbox game where you can build, craft, and explore
  in a world made of hexagonal blocks. Place blocks, craft items, and create your
  own hexagonal world.

version: "2.0.0"
grade: stable
confinement: strict
base: core22

apps:
  tesselbox:
    command: bin/tesselbox
    plugs:
      - home
      - x11
      - opengl
      - desktop
      - desktop-legacy
      - wayland

parts:
  tesselbox:
    plugin: go
    source: .
    build-snaps: [go/1.21/stable]
    override-build: |
      craftctl default
      go run build/build.go -os=linux -arch=amd64 -output=tesselbox -release
      install -D tesselbox $CRAFT_PART_INSTALL/bin/tesselbox

architectures:
  - build-on: amd64
  - build-on: arm64
